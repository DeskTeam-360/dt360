<!-- GHL Custom Code — Hero framed video ONLY (demo-call-scheduled-thank-you) -->
<!-- Paste ALL of this block. Responsive: tablet ≤768px, mobile ≤425px -->

<style>
  .dt360-video-framed {
    box-sizing: border-box;
    max-width: 900px;
    width: 100%;
    margin: 0 auto;
    overflow: hidden;
    border-radius: 16px;
    background: #2b2b2b;
    box-shadow: 0 24px 64px rgba(17, 16, 76, 0.18);
  }
  .dt360-video-framed__label {
    margin: 0;
    padding: 20px 24px;
    text-align: center;
    font-family: Poppins, Arial, sans-serif;
    font-size: 22px;
    font-weight: 600;
    line-height: 1.35;
    color: #ffffff;
    background: #2b2b2b;
  }
  .dt360-video-framed__player {
    position: relative;
    width: 100%;
    height: 0;
    padding-bottom: 56.25%;
    background: #1a1a1a;
  }
  .dt360-video-framed__player iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: 0;
  }

  @media (max-width: 768px) {
    .dt360-video-framed {
      max-width: calc(100% - 32px);
      border-radius: 14px;
      box-shadow: 0 16px 48px rgba(17, 16, 76, 0.16);
    }
    .dt360-video-framed__label {
      padding: 16px 20px;
      font-size: 18px;
      line-height: 1.4;
    }
  }

  @media (max-width: 425px) {
    .dt360-video-framed {
      max-width: calc(100% - 24px);
      border-radius: 12px;
      box-shadow: 0 12px 32px rgba(17, 16, 76, 0.14);
    }
    .dt360-video-framed__label {
      padding: 12px 14px;
      font-size: 15px;
      line-height: 1.35;
    }
  }
</style>

<div class="dt360-video-framed">
  <p class="dt360-video-framed__label">
    Watch This Video Explaining What To Expect On The Call
  </p>
  <div class="dt360-video-framed__player" style="position:relative;width:100%;height:0;padding-bottom:56.25%;">
    <iframe
      style="position:absolute;top:0;left:0;width:100%;height:100%;border:0;"
      src="https://player.vimeo.com/video/1203644058?title=0&amp;byline=0&amp;portrait=0"
      frameborder="0"
      allow="autoplay; fullscreen; picture-in-picture"
      allowfullscreen
      title="Video explaining what to expect on your consultation call"
    ></iframe>
  </div>
</div>
